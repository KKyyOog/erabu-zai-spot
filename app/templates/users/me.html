{% extends "base.html" %}

{% block content %}
<nav class="page-tabs" aria-label="マイページの表示切り替え">
  <button type="button" class="page-tab active" data-tab-target="profile-panel">プロフィール</button>
  <button type="button" class="page-tab" data-tab-target="materials-panel">登録した材</button>
  <button type="button" class="page-tab" data-tab-target="matches-panel">マッチング</button>
</nav>

<section class="card user-page-card tab-panel active" id="profile-panel">
  <div class="section-heading">
    <div>
      <h2 id="form-title">ユーザー情報</h2>
      <p id="profile-note" class="hint"></p>
    </div>
    <div id="loading-status" class="loading-status" role="status" aria-live="polite">
      <span class="loading-spinner" aria-hidden="true"></span>
      <span id="status">LINE プロフィールを取得しています...</span>
    </div>
  </div>

  <form id="user-form" method="post" action="{{ url_for('users.me_save') }}">
    <input type="hidden" name="line_user_id" id="line_user_id">
    <input type="hidden" name="user_id" id="user_id">
    <input type="hidden" name="userid" id="userid">
    <input type="hidden" name="id_token" id="id_token">

    <div class="profile-panels">
      <section class="profile-panel profile-panel--primary">
        <div class="panel-heading">
          <span class="entry-badge">基本情報</span>
          <h3>名前・拠点・運搬情報</h3>
        </div>

        <label>名前 *</label>
        <input type="text" name="display_name" id="display_name" required placeholder="例：山田太郎">

        <label>拠点住所 *</label>
        <input type="text" name="address" id="address" required placeholder="例：知名町、和泊町、現場名など">

        <label>運搬情報 *</label>
        <textarea name="transport_info" id="transport_info" rows="4" required placeholder="軽トラで搬送可能、4トンダンプで搬送可能など"></textarea>
      </section>

      <section class="profile-panel">
        <div class="panel-heading">
          <span class="entry-badge">連絡先共有カード</span>
          <h3>マッチ後に共有する連絡先</h3>
        </div>
        <p class="hint">同意した相手だけへ共有されます。</p>

        <label>共有用の表示名</label>
        <input type="text" name="contact_display_name" id="contact_display_name" placeholder="例：山田">

        <label>連絡方法</label>
        <select name="contact_method" id="contact_method">
          <option value="">選択してください</option>
          <option value="LINE">LINE</option>
          <option value="メール">メール</option>
          <option value="電話">電話</option>
          <option value="その他">その他</option>
        </select>

        <label>連絡先</label>
        <input type="text" name="contact_value" id="contact_value" placeholder="例：LINE ID、メールアドレスなど">

        <label>連絡しやすい時間帯</label>
        <select name="contact_available_time" id="contact_available_time">
          <option value="">選択してください</option>
          <option value="いつでも">いつでも</option>
          <option value="平日午前">平日午前</option>
          <option value="平日午後">平日午後</option>
          <option value="平日夕方以降">平日夕方以降</option>
          <option value="土日祝午前">土日祝午前</option>
          <option value="土日祝午後">土日祝午後</option>
          <option value="要相談">要相談</option>
        </select>

        <label>ひとこと</label>
        <textarea name="contact_message" id="contact_message" rows="3" placeholder="例：まずはLINEで「マッチングの件」と送ってください。"></textarea>
      </section>
    </div>

    <button type="submit" id="submit-button">登録する</button>
  </form>
</section>

<section class="card tab-panel" id="materials-panel" hidden>
  <div class="section-heading">
    <div>
      <h3>自分の材登録履歴</h3>
      <p class="hint">登録した材はここから内容を編集できます。</p>
    </div>
  </div>
  <div id="materials-container"><p>読み込み中...</p></div>
</section>

<section class="card tab-panel" id="matches-panel" hidden>
  <h3>マッチング履歴</h3>
  <div id="matching-history-container"><p>読み込み中...</p></div>
</section>

<script>
  window.LIFF_ID = {{ LIFF_ID|tojson }};
  let currentMaterials = [];
  let currentUserAddress = '';
  let currentIdToken = '';
  const LIFF_LOGIN_ATTEMPT_KEY = 'erabu_zai_spot_liff_login_attempted_at';
  const LIFF_LOGIN_RETRY_DELAY_MS = 60 * 1000;

  const materialTypeOptions = ['木材', '金属', '建具', '家具', '石材・ブロック', '設備・配管', 'その他'];
  const quantityOptions = ['少量（手持ち）', '軽トラ1台未満', '軽トラ1台分', '2tトラック1台分', 'それ以上', '要相談'];
  const conditionOptions = ['★☆☆☆☆', '★★☆☆☆', '★★★☆☆', '★★★★☆', '★★★★★'];

  function clearLegacyLiffReturnUrl() {
    try {
      window.localStorage.removeItem('erabu_zai_spot_liff_return_url');
    } catch (error) {
      console.warn('Failed to clear legacy LIFF return URL:', error);
    }
  }

  function clearLiffLoginAttempt() {
    try {
      window.sessionStorage.removeItem(LIFF_LOGIN_ATTEMPT_KEY);
    } catch (error) {
      console.warn('Failed to clear LIFF login attempt:', error);
    }
  }

  function recentlyAttemptedLiffLogin() {
    try {
      const attemptedAt = Number(window.sessionStorage.getItem(LIFF_LOGIN_ATTEMPT_KEY) || 0);
      return attemptedAt > 0 && Date.now() - attemptedAt < LIFF_LOGIN_RETRY_DELAY_MS;
    } catch (error) {
      console.warn('Failed to read LIFF login attempt:', error);
      return false;
    }
  }

  function rememberLiffLoginAttempt() {
    try {
      window.sessionStorage.setItem(LIFF_LOGIN_ATTEMPT_KEY, String(Date.now()));
    } catch (error) {
      console.warn('Failed to store LIFF login attempt:', error);
    }
  }

  function liffLoginRedirectUrl() {
    return `${window.location.origin}${window.location.pathname}`;
  }

  function initializePageTabs() {
    document.querySelectorAll('[data-tab-target]').forEach((button) => {
      button.addEventListener('click', () => {
        const targetId = button.dataset.tabTarget;
        document.querySelectorAll('[data-tab-target]').forEach((tab) => {
          tab.classList.toggle('active', tab === button);
        });
        document.querySelectorAll('.tab-panel').forEach((panel) => {
          const active = panel.id === targetId;
          panel.classList.toggle('active', active);
          panel.hidden = !active;
        });
      });
    });
  }

  function getLiffDebugContext() {
    return {
      href: window.location.href,
      origin: window.location.origin,
      pathname: window.location.pathname,
      search: window.location.search,
      hasLiff: Boolean(window.liff),
      inClient: Boolean(window.liff && liff.isInClient && liff.isInClient()),
      userAgent: navigator.userAgent,
    };
  }

  function logLiffDebug(message, details = {}) {
    const payload = JSON.stringify({
      message: message,
      details: details,
      timestamp: new Date().toISOString(),
    });

    try {
      if (navigator.sendBeacon) {
        const sent = navigator.sendBeacon('/link/liff-debug', new Blob([payload], { type: 'application/json' }));
        if (sent) {
          return;
        }
      }

      fetch('/link/liff-debug', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: payload,
        keepalive: true,
      }).catch((error) => {
        console.warn('Failed to send LIFF debug log:', error);
      });
    } catch (error) {
      console.warn('Failed to send LIFF debug log:', error);
    }
  }

  async function syncLineSession(userId, idToken) {
    if (!userId || !idToken) {
      return false;
    }

    try {
      const resp = await fetch('/link/liff', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, idToken }),
        keepalive: true,
      });
      return resp.ok;
    } catch (error) {
      console.warn('Failed to sync LINE session:', error);
      return false;
    }
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function formatDateJp(value) {
    if (!value) {
      return '';
    }
    const normalized = String(value).trim().replace(' ', 'T');
    const date = new Date(normalized);
    if (!Number.isNaN(date.getTime())) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
    }

    const match = String(value).match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
    if (match) {
      return `${Number(match[1])}年${Number(match[2])}月${Number(match[3])}日`;
    }

    return String(value).split(' ')[0];
  }

  function parseImageUrls(value) {
    if (!value) {
      return [];
    }
    if (Array.isArray(value)) {
      return value.filter(Boolean);
    }

    const text = String(value).trim();
    if (!text) {
      return [];
    }

    if (text.startsWith('[')) {
      try {
        const parsed = JSON.parse(text);
        if (Array.isArray(parsed)) {
          return parsed.filter(Boolean);
        }
      } catch (error) {
        console.warn('Failed to parse image URLs:', error);
      }
    }

    return text.replaceAll(',', '\n').split(/\r?\n/).map((url) => url.trim()).filter(Boolean);
  }

  function getMaterialImageUrls(material) {
    const urls = parseImageUrls(material.image_urls);
    const primary = parseImageUrls(material.image_url);
    return [...new Set([...urls, ...primary])];
  }

  function renderOptions(options, selectedValue, emptyLabel = '') {
    const emptyOption = emptyLabel ? `<option value="">${escapeHtml(emptyLabel)}</option>` : '';
    const optionValues = [...options];
    if (selectedValue && !optionValues.includes(selectedValue)) {
      optionValues.unshift(selectedValue);
    }
    return emptyOption + optionValues.map((option) => {
      const selected = option === selectedValue ? ' selected' : '';
      return `<option value="${escapeHtml(option)}"${selected}>${escapeHtml(option)}</option>`;
    }).join('');
  }

  function renderConditionStars(selectedValue) {
    const optionValues = [...conditionOptions];
    if (selectedValue && !optionValues.includes(selectedValue)) {
      optionValues.unshift(selectedValue);
    }
    return optionValues.map((option, index) => {
      const id = `condition_${index + 1}_${Math.random().toString(36).slice(2)}`;
      const checked = option === selectedValue || (!selectedValue && option === '★★★☆☆') ? ' checked' : '';
      return `
        <input type="radio" name="condition" id="${id}" value="${escapeHtml(option)}"${checked}>
        <label for="${id}">${escapeHtml(option)}</label>
      `;
    }).join('');
  }

  function formatDateInput(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function deadlineDateAfter({ days = 0, months = 0 }) {
    const date = new Date();
    date.setHours(0, 0, 0, 0);
    if (days) {
      date.setDate(date.getDate() + days);
    }
    if (months) {
      date.setMonth(date.getMonth() + months);
    }
    return formatDateInput(date);
  }

  function getInitialDeadlineMode(value) {
    if (value === '無期限') {
      return 'unlimited';
    }
    if (value) {
      return 'custom';
    }
    return 'one_week';
  }

  function dateInputValue(value) {
    const match = String(value || '').match(/^(\d{4}-\d{2}-\d{2})/);
    return match ? match[1] : '';
  }

  function updateEditDeadlineValue(form) {
    const mode = form.querySelector('[data-deadline-mode]').value;
    const customInput = form.querySelector('[data-custom-deadline]');
    const hiddenInput = form.querySelector('[name="pickup_deadline"]');
    customInput.hidden = mode !== 'custom';

    if (mode === 'one_week') {
      hiddenInput.value = deadlineDateAfter({ days: 7 });
    } else if (mode === 'two_weeks') {
      hiddenInput.value = deadlineDateAfter({ days: 14 });
    } else if (mode === 'one_month') {
      hiddenInput.value = deadlineDateAfter({ months: 1 });
    } else if (mode === 'unlimited') {
      hiddenInput.value = '無期限';
    } else {
      hiddenInput.value = customInput.value;
    }
  }

  function updateEditLocationValue(form) {
    const mode = form.querySelector('[data-location-mode]').value;
    const locationInput = form.querySelector('[name="location"]');
    const note = form.querySelector('[data-location-note]');

    if (mode === 'profile' && currentUserAddress) {
      locationInput.value = currentUserAddress;
      locationInput.readOnly = true;
      note.textContent = `ユーザー情報の拠点住所: ${currentUserAddress}`;
    } else {
      locationInput.readOnly = false;
      note.textContent = mode === 'profile'
        ? 'ユーザー情報の拠点住所が未登録のため、住所を入力してください。'
        : 'この材だけ別の保管場所を登録します。';
    }
  }

  function initializeMaterialEditForm(form) {
    const deadlineMode = form.querySelector('[data-deadline-mode]');
    const customDeadline = form.querySelector('[data-custom-deadline]');
    const locationMode = form.querySelector('[data-location-mode]');

    deadlineMode.addEventListener('change', () => updateEditDeadlineValue(form));
    customDeadline.addEventListener('input', () => updateEditDeadlineValue(form));
    locationMode.addEventListener('change', () => updateEditLocationValue(form));
    updateEditDeadlineValue(form);
    updateEditLocationValue(form);
  }

  function renderMaterials(materials, userId) {
    currentMaterials = materials || [];
    const container = document.getElementById('materials-container');
    if (!currentMaterials.length) {
      container.innerHTML = `
        <div class="empty-state">
          <p>まだ材登録がありません。</p>
          <a class="button-link compact" href="/materials/register/material">材を登録する</a>
        </div>
      `;
      return;
    }

    container.innerHTML = currentMaterials.map((material) => renderMaterialCard(material, userId)).join('');
  }

  function renderMaterialCard(material, userId) {
    const imageUrls = getMaterialImageUrls(material);
    const thumb = imageUrls[0]
      ? `<img class="history-thumb" src="${escapeHtml(imageUrls[0])}" alt="${escapeHtml(material.title || '材の写真')}" loading="lazy" decoding="async">`
      : '<div class="history-thumb history-thumb--empty">写真なし</div>';

    return `
      <div class="history-card material-history-item" id="material-card-${escapeHtml(material.material_id)}">
        <div class="history-card__header">
          <div class="history-card__title">
            <span class="entry-badge">材登録</span>
            <h4>${escapeHtml(material.title || '名称未設定')}</h4>
          </div>
          <span class="listing-date">${escapeHtml(formatDateJp(material.created_at))}</span>
        </div>
        <div class="history-card__bodyline">
          ${thumb}
          <dl class="summary-list compact-list">
            <div>
              <dt>種類</dt>
              <dd>${escapeHtml(material.material_type || '未設定')}</dd>
            </div>
            <div>
              <dt>保管場所</dt>
              <dd>${escapeHtml(material.location || '未設定')}</dd>
            </div>
            <div>
              <dt>状態</dt>
              <dd>${escapeHtml(material.condition || '未設定')}</dd>
            </div>
          </dl>
        </div>
        <div class="history-actions">
          <button type="button" class="secondary-button" onclick="showMaterialEdit('${escapeHtml(material.material_id)}')">編集する</button>
          <form method="post" action="/materials/${encodeURIComponent(material.material_id)}/delete" data-confirm-message="この材登録を削除します。元に戻せません。よろしいですか？">
            <input type="hidden" name="line_user_id" value="${escapeHtml(userId)}">
            <input type="hidden" name="id_token" value="${escapeHtml(currentIdToken)}">
            <input type="hidden" name="return_to" value="me">
            <button type="submit" class="danger-button">削除する</button>
          </form>
        </div>
      </div>
    `;
  }

  function showMaterialEdit(materialId) {
    const material = currentMaterials.find((item) => item.material_id === materialId);
    if (!material) {
      return;
    }

    const userId = document.getElementById('line_user_id').value;
    const imageText = getMaterialImageUrls(material).join('\n');
    const card = document.getElementById(`material-card-${materialId}`);
    const locationMode = currentUserAddress && material.location === currentUserAddress ? 'profile' : 'custom';
    const deadlineMode = getInitialDeadlineMode(material.pickup_deadline || '');
    const customDeadlineValue = deadlineMode === 'custom' ? dateInputValue(material.pickup_deadline) : '';
    card.innerHTML = `
      <form class="material-edit-form" onsubmit="submitMaterialEdit(event, '${escapeHtml(material.material_id)}')" enctype="multipart/form-data">
        <input type="hidden" name="line_user_id" value="${escapeHtml(userId)}">
        <input type="hidden" name="id_token" value="${escapeHtml(currentIdToken)}">
        <div class="history-card__header">
          <div class="history-card__title">
            <span class="entry-badge">編集中</span>
            <h4>${escapeHtml(material.title || '名称未設定')}</h4>
          </div>
          <span class="listing-date">${escapeHtml(formatDateJp(material.created_at))}</span>
        </div>

        <div class="edit-grid">
          <div>
            <label>材の名前 *</label>
            <input type="text" name="title" value="${escapeHtml(material.title || '')}" required>
          </div>
          <div>
            <label>材の種類 *</label>
            <select name="material_type" required>
              ${renderOptions(materialTypeOptions, material.material_type || '', '選択してください')}
            </select>
          </div>
          <div>
            <label>保管場所 *</label>
            <select data-location-mode>
              <option value="profile"${locationMode === 'profile' ? ' selected' : ''}>ユーザー情報の拠点を使う</option>
              <option value="custom"${locationMode === 'custom' ? ' selected' : ''}>別の住所を入力する</option>
            </select>
            <input type="text" name="location" value="${escapeHtml(material.location || '')}" required>
            <p class="hint" data-location-note></p>
          </div>
          <div class="edit-grid__full">
            <fieldset class="form-fieldset size-builder" data-size-builder data-size-initial-mode="${material.size ? 'free' : 'board'}">
              <legend>寸法</legend>
              <p class="hint">建築資材でよく使う書き方を選べます。既存の値は自由記入でそのまま残せます。</p>

              <label>記入方法</label>
              <div class="size-preset-tabs" aria-label="寸法の書き方を選ぶ">
                <button type="button" class="size-preset-button" data-size-mode-button="board">板材</button>
                <button type="button" class="size-preset-button" data-size-mode-button="square">角材</button>
                <button type="button" class="size-preset-button" data-size-mode-button="door">建具</button>
                <button type="button" class="size-preset-button" data-size-mode-button="round">丸物</button>
                <button type="button" class="size-preset-button" data-size-mode-button="pipe">配管</button>
                <button type="button" class="size-preset-button" data-size-mode-button="free">自由記入</button>
              </div>
              <select data-size-mode-select>
                <option value="board">板材・一般材（L×W×t）</option>
                <option value="square">角材（L×□）</option>
                <option value="door">建具（W×H）</option>
                <option value="round">丸物（φ×L）</option>
                <option value="pipe">配管（L×φ×t）</option>
                <option value="free">自由記入</option>
              </select>

              <div class="size-builder__panel" data-size-panel="board">
                <div class="size-builder__grid">
                  <div>
                    <label>長さ</label>
                    <input type="text" inputmode="decimal" data-size-field="length" placeholder="1800">
                  </div>
                  <div>
                    <label>幅</label>
                    <input type="text" inputmode="decimal" data-size-field="width" placeholder="90">
                  </div>
                  <div>
                    <label>厚み</label>
                    <input type="text" inputmode="decimal" data-size-field="thickness" placeholder="30">
                  </div>
                  <div>
                    <label>単位</label>
                    <select data-size-unit>
                      <option value="mm">mm</option>
                      <option value="cm">cm</option>
                      <option value="m">m</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="size-builder__panel" data-size-panel="square" hidden>
                <div class="size-builder__grid">
                  <div>
                    <label>長さ</label>
                    <input type="text" inputmode="decimal" data-size-field="length" placeholder="1800">
                  </div>
                  <div>
                    <label>断面一辺</label>
                    <input type="text" inputmode="decimal" data-size-field="section" placeholder="90">
                  </div>
                  <div>
                    <label>単位</label>
                    <select data-size-unit>
                      <option value="mm">mm</option>
                      <option value="cm">cm</option>
                      <option value="m">m</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="size-builder__panel" data-size-panel="door" hidden>
                <div class="size-builder__grid">
                  <div>
                    <label>幅</label>
                    <input type="text" inputmode="decimal" data-size-field="width" placeholder="850">
                  </div>
                  <div>
                    <label>高さ</label>
                    <input type="text" inputmode="decimal" data-size-field="height" placeholder="2000">
                  </div>
                  <div>
                    <label>単位</label>
                    <select data-size-unit>
                      <option value="mm">mm</option>
                      <option value="cm">cm</option>
                      <option value="m">m</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="size-builder__panel" data-size-panel="round" hidden>
                <div class="size-builder__grid">
                  <div>
                    <label>直径</label>
                    <input type="text" inputmode="decimal" data-size-field="diameter" placeholder="60">
                  </div>
                  <div>
                    <label>長さ</label>
                    <input type="text" inputmode="decimal" data-size-field="length" placeholder="2400">
                  </div>
                  <div>
                    <label>単位</label>
                    <select data-size-unit>
                      <option value="mm">mm</option>
                      <option value="cm">cm</option>
                      <option value="m">m</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="size-builder__panel" data-size-panel="pipe" hidden>
                <div class="size-builder__grid">
                  <div>
                    <label>長さ</label>
                    <input type="text" inputmode="decimal" data-size-field="length" placeholder="2000">
                  </div>
                  <div>
                    <label>外径</label>
                    <input type="text" inputmode="decimal" data-size-field="outerDiameter" placeholder="27">
                  </div>
                  <div>
                    <label>肉厚</label>
                    <input type="text" inputmode="decimal" data-size-field="thickness" placeholder="2.3">
                  </div>
                  <div>
                    <label>単位</label>
                    <select data-size-unit>
                      <option value="mm">mm</option>
                      <option value="cm">cm</option>
                      <option value="m">m</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="size-builder__panel" data-size-panel="free" hidden>
                <label>寸法をそのまま記入</label>
                <input type="text" data-size-free value="${escapeHtml(material.size || '')}" placeholder="例：L1800×W90×t30mm / φ60×L2400">
              </div>

              <input type="hidden" name="size" data-size-hidden value="${escapeHtml(material.size || '')}">
              <p class="hint size-builder__preview" data-size-preview>寸法の入力形式を選ぶと、表示例がここに出ます。</p>
            </fieldset>
          </div>
          <div>
            <label>数量</label>
            <select name="quantity">
              ${renderOptions(quantityOptions, material.quantity || '', '選択してください')}
            </select>
          </div>
          <div class="edit-grid__full">
            <fieldset class="form-fieldset">
              <legend>状態</legend>
              <div class="star-rating" role="radiogroup" aria-label="状態の五段階評価">
                ${renderConditionStars(material.condition || '')}
              </div>
            </fieldset>
          </div>
          <div>
            <label>取引期限</label>
            <select data-deadline-mode>
              <option value="one_week"${deadlineMode === 'one_week' ? ' selected' : ''}>1週間</option>
              <option value="two_weeks"${deadlineMode === 'two_weeks' ? ' selected' : ''}>2週間</option>
              <option value="one_month"${deadlineMode === 'one_month' ? ' selected' : ''}>一カ月</option>
              <option value="unlimited"${deadlineMode === 'unlimited' ? ' selected' : ''}>無期限</option>
              <option value="custom"${deadlineMode === 'custom' ? ' selected' : ''}>カスタム</option>
            </select>
            <input type="date" data-custom-deadline class="conditional-input" value="${escapeHtml(customDeadlineValue)}">
            <input type="hidden" name="pickup_deadline" value="${escapeHtml(material.pickup_deadline || '')}">
          </div>
          <div class="edit-grid__full">
            <label>説明</label>
            <textarea name="description" rows="3">${escapeHtml(material.description || '')}</textarea>
          </div>
          <div class="edit-grid__full">
            <label>写真URL（複数可）</label>
            <textarea name="image_urls_text" rows="3">${escapeHtml(imageText)}</textarea>
          </div>
          <div class="edit-grid__full">
            <label>写真を追加</label>
            <input type="file" name="image_files" accept="image/*" multiple>
          </div>
        </div>

        <div class="history-actions">
          <button type="submit">保存する</button>
          <button type="button" class="secondary-button" onclick="renderMaterials(currentMaterials, '${escapeHtml(userId)}')">キャンセル</button>
        </div>
        <p class="form-error" aria-live="polite"></p>
      </form>
    `;
    initMaterialSizeBuilders(card);
    initializeMaterialEditForm(card.querySelector('form'));
  }

  async function submitMaterialEdit(event, materialId) {
    event.preventDefault();
    const form = event.currentTarget;
    const error = form.querySelector('.form-error');
    const submitButton = form.querySelector('button[type="submit"]');
    error.textContent = '';
    submitButton.disabled = true;

    try {
      const resp = await fetch(`/materials/${encodeURIComponent(materialId)}/update`, {
        method: 'POST',
        body: new FormData(form),
      });
      const body = await resp.json();
      if (!resp.ok || !body.ok) {
        error.textContent = body.message || '材登録の更新に失敗しました。';
        return;
      }

      currentMaterials = currentMaterials.map((item) => item.material_id === materialId ? body.material : item);
      renderMaterials(currentMaterials, document.getElementById('line_user_id').value);
    } catch (errorObj) {
      console.error(errorObj);
      error.textContent = '通信に失敗しました。時間をおいて再度お試しください。';
    } finally {
      submitButton.disabled = false;
    }
  }

  function renderMatchingHistory(history) {
    const container = document.getElementById('matching-history-container');
    const currentUserId = document.getElementById('line_user_id').value;
    if (!history || history.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <p>まだマッチング履歴はありません。</p>
          <a class="button-link compact" href="/materials/list">一覧を見る</a>
        </div>
      `;
      return;
    }

    container.innerHTML = history.map((match) => {
      const isProvider = match.provider_user_id === currentUserId;
      const shareStatus = isProvider ? match.provider_contact_share_status : match.requester_contact_share_status;
      const matchType = match.match_type || 'material';
      const entryLabel = matchType === 'viewing' ? '見学' : '材';
      const roleLabel = isProvider ? '登録者側' : '希望者側';
      const entryId = match.entry_id || match.material_id || match.property_id || '';
      const title = match.entry_title || entryId || 'ID未設定';
      const thumb = match.entry_image_url
        ? `<img class="history-thumb history-thumb--small" src="${escapeHtml(match.entry_image_url)}" alt="${escapeHtml(title)}" loading="lazy" decoding="async">`
        : '<div class="history-thumb history-thumb--small history-thumb--empty">写真なし</div>';
      const shareAction = `/users/matches/${encodeURIComponent(matchType)}/${encodeURIComponent(match.match_id)}/share-contact`;
      const shareControl = shareStatus === 'shared'
        ? '<p class="share-status shared">連絡先カード共有済み</p>'
        : `
          <form method="post" action="${shareAction}">
            <input type="hidden" name="line_user_id" value="${escapeHtml(currentUserId)}">
            <input type="hidden" name="id_token" value="${escapeHtml(currentIdToken)}">
            <button type="submit">連絡先カードを共有する</button>
          </form>
        `;

      return `
        <div class="history-card matching-history-item">
          <div class="history-card__header">
            <div class="history-card__title">
              <span class="entry-badge ${matchType === 'viewing' ? 'demolition' : ''}">${entryLabel}マッチング</span>
              <h4>${escapeHtml(title)}</h4>
            </div>
            <span class="listing-date">${escapeHtml(formatDateJp(match.created_at))}</span>
          </div>
          <div class="history-card__bodyline">
            ${thumb}
            <div>
              <div class="match-meta">
                <span>${escapeHtml(roleLabel)}</span>
                <span>${escapeHtml(match.action || '操作未設定')}</span>
                <span>${escapeHtml(match.status || '状態未設定')}</span>
              </div>
              ${match.message ? `<p class="match-message">${escapeHtml(match.message)}</p>` : ''}
              ${shareControl}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function fillUserForm(user) {
    currentUserAddress = user.address || '';
    document.getElementById('display_name').value = user.display_name || '';
    document.getElementById('address').value = user.address || '';
    document.getElementById('transport_info').value = user.transport_info || '';
  }

  function fillContactCard(card, user) {
    document.getElementById('contact_display_name').value = card.display_name || user.display_name || '';
    document.getElementById('contact_method').value = card.contact_method || '';
    document.getElementById('contact_value').value = card.contact_value || '';
    document.getElementById('contact_available_time').value = card.available_time || '';
    document.getElementById('contact_message').value = card.message || '';
  }

  function clearUserForm() {
    fillUserForm({
      display_name: '',
      address: '',
      transport_info: '',
    });
    fillContactCard({}, {});
  }

  function setSubmitEnabled(enabled) {
    document.getElementById('submit-button').disabled = !enabled;
  }

  function setLoading(isLoading, message) {
    const loadingStatus = document.getElementById('loading-status');
    const status = document.getElementById('status');
    loadingStatus.classList.toggle('is-loading', isLoading);
    status.textContent = message;
  }

  function showUnavailableState(message) {
    clearUserForm();
    renderMaterials([], '');
    renderMatchingHistory([]);
    document.getElementById('form-title').textContent = 'ユーザー情報';
    document.getElementById('profile-note').textContent = '';
    setLoading(false, message);
    setSubmitEnabled(false);
  }

  function showRegistrationPrompt() {
    window.alert('ユーザー情報がまだ登録されていません。続けてユーザー情報を登録してください。');
  }

  async function initMeFlow() {
    setSubmitEnabled(false);
    setLoading(true, 'LINE プロフィールを取得しています...');
    if (!window.LIFF_ID) {
      showUnavailableState('LIFF が設定されていないため、ユーザー情報を読み込めません。');
      return;
    }

    if (!window.liff) {
      showUnavailableState('LIFF SDK を読み込めないため、ユーザー情報を読み込めません。');
      return;
    }

    try {
      await liff.init({ liffId: window.LIFF_ID });
      clearLegacyLiffReturnUrl();
      if (!liff.isLoggedIn()) {
        if (liff.isInClient && liff.isInClient()) {
          logLiffDebug('users/me LIFF client was unexpectedly logged out.', getLiffDebugContext());
          showUnavailableState('LINEログインを確認できませんでした。画面を閉じて、LINEから開き直してください。');
          return;
        }

        if (recentlyAttemptedLiffLogin()) {
          logLiffDebug('users/me stopped repeated LIFF login.', getLiffDebugContext());
          showUnavailableState('LINEログインが完了しませんでした。少し待ってから画面を開き直してください。');
          return;
        }

        rememberLiffLoginAttempt();
        logLiffDebug('users/me redirecting to LIFF login.', getLiffDebugContext());
        setLoading(true, 'LINEログインへ移動しています...');
        liff.login({ redirectUri: liffLoginRedirectUrl() });
        return;
      }
      clearLiffLoginAttempt();
      logLiffDebug('users/me LIFF login confirmed.', getLiffDebugContext());
      const profile = await liff.getProfile();
      currentIdToken = liff.getIDToken() || '';
      document.getElementById('line_user_id').value = profile.userId;
      document.getElementById('user_id').value = profile.userId;
      document.getElementById('userid').value = profile.userId;
      document.getElementById('id_token').value = currentIdToken;
      document.getElementById('profile-note').textContent = `LINE表示名: ${profile.displayName}`;
      await syncLineSession(profile.userId, currentIdToken);
      setLoading(true, '登録情報を読み込んでいます...');

      const resp = await fetch('/users/me/data', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': window.CSRF_TOKEN || '',
        },
        body: JSON.stringify({ userId: profile.userId, idToken: currentIdToken }),
      });
      const body = await resp.json();
      if (!resp.ok || !body.ok) {
        clearUserForm();
        renderMaterials([], profile.userId);
        renderMatchingHistory([]);
        document.getElementById('form-title').textContent = 'ユーザー情報（新規登録）';
        document.getElementById('submit-button').textContent = '登録する';
        setLoading(false, 'ユーザー情報を読み込めませんでした。新規登録として入力してください。');
        return;
      }
      setSubmitEnabled(true);
      currentUserAddress = body.user?.address || '';
      renderMaterials(body.materials || [], profile.userId);
      renderMatchingHistory(body.matching_history || []);
      fillContactCard(body.contact_card || {}, body.user || {});
      if (body.ok && body.exists) {
        document.getElementById('form-title').textContent = 'ユーザー情報（更新）';
        fillUserForm(body.user || {});
        document.getElementById('submit-button').textContent = '更新する';
        setLoading(false, '登録済みの情報を読み込みました。');
      } else {
        clearUserForm();
        document.getElementById('form-title').textContent = 'ユーザー情報（新規登録）';
        document.getElementById('submit-button').textContent = '登録する';
        setLoading(false, '新規登録用の空フォームです。');
        setTimeout(showRegistrationPrompt, 0);
      }
    } catch (e) {
      console.error(e);
      logLiffDebug('users/me LIFF error: ' + e.message, getLiffDebugContext());
      showUnavailableState('ユーザー情報の取得に失敗しました。');
    }
  }

  initializePageTabs();
  initMeFlow();
</script>

<script src="{{ url_for('static', filename='js/size_builder.js') }}"></script>

{% endblock %}
