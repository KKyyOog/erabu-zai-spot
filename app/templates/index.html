{% extends "base.html" %}

{% block content %}
<script>
  window.LIFF_ID = {{ LIFF_ID|tojson }};

  (function routeLiffState() {
    const params = new URLSearchParams(window.location.search);
    const rawState = params.get("liff.state");
    if (!rawState) {
      return;
    }

    let target;
    try {
      target = new URL(rawState, window.location.origin);
    } catch (error) {
      console.warn("Invalid LIFF state:", error);
      return;
    }

    if (target.origin !== window.location.origin || !target.pathname.startsWith("/")) {
      return;
    }

    const targetParams = new URLSearchParams(target.search);
    [
      "liff.referrer",
      "access_token",
      "context_token",
      "feature_token",
      "id_token",
      "client_id",
      "mst_challenge",
    ].forEach((name) => targetParams.delete(name));

    const cleanSearch = targetParams.toString();
    const targetUrl = target.pathname + (cleanSearch ? `?${cleanSearch}` : "");

    const moveToTarget = () => {
      window.location.replace(targetUrl);
    };

    if (!window.liff || !window.LIFF_ID) {
      moveToTarget();
      return;
    }

    liff.init({ liffId: window.LIFF_ID })
      .catch((error) => {
        console.warn("LIFF state initialization failed:", error);
      })
      .finally(moveToTarget);
  })();
</script>

<section class="card">
  <h2>えらぶ材すぽっと</h2>
  <p class="hint">目的のページを選んでください。</p>

  <div class="choice-grid">
    <a class="choice-card" href="{{ liff_url_for('materials.list_materials') }}">
      <span class="choice-title">一覧を見る</span>
      <span class="choice-text">登録された材と解体物件を確認します。</span>
    </a>

    <a class="choice-card" href="{{ liff_url_for('materials.register') }}">
      <span class="choice-title">登録する</span>
      <span class="choice-text">材または解体物件の情報を登録します。</span>
    </a>

    <a class="choice-card" href="{{ liff_url_for('users.me') }}">
      <span class="choice-title">マイページ</span>
      <span class="choice-text">自分の登録情報、履歴、連絡先カードを確認します。</span>
    </a>
  </div>
</section>
{% endblock %}
